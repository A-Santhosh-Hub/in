<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submit Parcel - ALP Institute</title>
  <meta name="description" content="Student parcel submission portal for ALP Institute">
  <link rel="stylesheet" href="../css/styles.css">
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
</head>
<body>
  <!-- Page Loader -->
  <div class="page-loader" id="pageLoader">
    <div class="loader-spinner"></div>
    <div class="loader-text">Loading...</div>
  </div>

  <div class="page-centered" style="flex-direction: column; gap: 0;">
    <div style="width: 100%; max-width: 640px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px;">
      <a href="../index.html" class="btn btn-ghost btn-sm"><i data-lucide="arrow-left"></i> Home</a>
      <button class="navbar-btn theme-toggle" id="themeToggle" onclick="Theme.toggle()"><i data-lucide="moon"></i></button>
    </div>

    <div class="auth-card" style="max-width: 640px;" data-aos="fade-up">
      <div class="auth-header">
        <div class="auth-logo"><i data-lucide="package-plus"></i></div>
        <h2>Submit Exam Parcel</h2>
        <p>Fill in your details to submit your exam parcel for processing</p>
      </div>
      <div class="auth-body">
        <form id="parcelForm">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Student ID *</label>
              <input type="text" id="studentId" class="form-control" placeholder="e.g., STU001" required>
              <span class="form-error">Student ID is required</span>
            </div>
            <div class="form-group">
              <label class="form-label">Student Name *</label>
              <input type="text" id="studentName" class="form-control" placeholder="Full Name" required>
              <span class="form-error">Name is required</span>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Class Category *</label>
              <select id="classCategory" class="form-control" required>
                <option value="">Select Category</option>
                <option value="Basic">Basic</option>
                <option value="Advanced">Advanced</option>
                <option value="Vast">Vast</option>
              </select>
              <span class="form-error">Please select a category</span>
            </div>
            <div class="form-group">
              <label class="form-label">Mobile Number *</label>
              <input type="tel" id="mobile" class="form-control" placeholder="10-digit number" pattern="[0-9]{10}" required>
              <span class="form-error">Valid 10-digit number required</span>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Location *</label>
              <input type="text" id="location" class="form-control" placeholder="City / Town" required>
              <span class="form-error">Location is required</span>
            </div>
            <div class="form-group">
              <label class="form-label">Parcel Type *</label>
              <select id="parcelType" class="form-control" required>
                <option value="">Select Type</option>
                <option value="Answer Sheet">Answer Sheet</option>
                <option value="Assignment">Assignment</option>
                <option value="Practical Record">Practical Record</option>
                <option value="Project Report">Project Report</option>
              </select>
              <span class="form-error">Please select parcel type</span>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Parcel Status</label>
            <select id="parcelStatus" class="form-control">
              <option value="Dispatched">Dispatched</option>
              <option value="In Transit">In Transit</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Additional Notes</label>
            <textarea id="notes" class="form-control" placeholder="Any special instructions or remarks..." rows="3"></textarea>
          </div>
          <button type="submit" class="btn btn-primary btn-lg btn-block" id="submitBtn">
            <i data-lucide="send"></i> Submit Parcel
          </button>
        </form>
      </div>
    </div>

    <div style="margin-top: 24px; text-align: center;">
      <p style="font-size: 13px; color: var(--text-tertiary);">
        Developed By <a href="https://a-santhosh-hub.github.io/in/" target="_blank" style="color: var(--primary-500); font-weight: 600;">Santhosh A</a>
      </p>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script>
    lucide.createIcons();
    window.addEventListener('load', () => document.getElementById('pageLoader').classList.add('hidden'));

    document.getElementById('parcelForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');

      const fields = {
        studentId: document.getElementById('studentId').value.trim(),
        studentName: document.getElementById('studentName').value.trim(),
        classCategory: document.getElementById('classCategory').value,
        mobile: document.getElementById('mobile').value.trim(),
        location: document.getElementById('location').value.trim(),
        parcelType: document.getElementById('parcelType').value,
        parcelStatus: document.getElementById('parcelStatus').value,
      };

      // Validate
      let valid = true;
      Object.entries(fields).forEach(([key, val]) => {
        const el = document.getElementById(key === 'classCategory' ? 'classCategory' : key);
        if (!val) { el.classList.add('is-error'); valid = false; }
        else { el.classList.remove('is-error'); }
      });
      if (!valid) { Toast.error('Validation', 'Please fill all required fields'); return; }

      Loading.setButton(btn, true);
      try {
        await API.submitParcel(fields);
        Toast.success('Parcel Submitted!', 'Your parcel has been submitted for processing.');
        document.getElementById('parcelForm').reset();
      } catch (error) {
        Toast.error('Submission Failed', error.message);
      } finally {
        Loading.setButton(btn, false);
      }
    });
  </script>
</body>
</html>
